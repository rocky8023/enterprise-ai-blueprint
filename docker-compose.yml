services:
  blueprint:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-ai-blueprint:latest
    container_name: enterprise-ai-blueprint
    ports:
      - "8080:8080"
    environment:
      BLUEPRINT_CHAT_API_KEY: ${BLUEPRINT_CHAT_API_KEY:?BLUEPRINT_CHAT_API_KEY is required}
      BLUEPRINT_CHAT_BASE_URL: ${BLUEPRINT_CHAT_BASE_URL:-}
      BLUEPRINT_CHAT_MODEL: ${BLUEPRINT_CHAT_MODEL:-}
      BLUEPRINT_EMBEDDING_API_KEY: ${BLUEPRINT_EMBEDDING_API_KEY:?BLUEPRINT_EMBEDDING_API_KEY is required}
      BLUEPRINT_EMBEDDING_BASE_URL: ${BLUEPRINT_EMBEDDING_BASE_URL:-}
      BLUEPRINT_EMBEDDING_MODEL: ${BLUEPRINT_EMBEDDING_MODEL:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      TZ: Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
