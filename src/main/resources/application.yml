spring:
  application:
    name: enterprise-ai-blueprint

  # providers.yml 包含厂商 preset 字典，由 ProviderPresetEnvironmentPostProcessor 解析后
  # 注入到 spring.ai.openai.chat.* / embedding.*。本文件不再硬编码默认 base-url / model。
  config:
    import: "classpath:providers.yml"

  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

  ai:
    openai:
      chat:
        api-key: ${BLUEPRINT_CHAT_API_KEY:}
        # base-url 与 options.model / options.temperature 由 preset 注入
        # 若设置 BLUEPRINT_CHAT_BASE_URL / BLUEPRINT_CHAT_MODEL，会覆盖 preset
      embedding:
        api-key: ${BLUEPRINT_EMBEDDING_API_KEY:}
        # 同上

blueprint:
  provider:
    chat:
      preset: minimax           # 默认 chat preset；env BLUEPRINT_CHAT_PRESET 可覆盖
    embedding:
      preset: dashscope         # 默认 embedding preset；env BLUEPRINT_EMBEDDING_PRESET 可覆盖
  prompts:
    location: classpath:prompts/*.md
    active:
      rag.company-qa: v1
  rag:
    top-k: 4
  observability:
    max-traces: 200          # 内存环形缓冲容量，超出丢弃最旧记录
    currency: CNY            # 成本货币单位（仅用于展示）
    # 模型定价表（外置为配置，便于按厂商/企业折扣价调整）。
    # 单位：元 / 1K tokens，input=提示词、output=补全。
    # 注意：以下为示例价格，请以各厂商官网最新价为准，按需修改。
    pricing:
      - { model: MiniMax-M2.7,    input: 0.001,  output: 0.008 }
      - { model: deepseek-chat,   input: 0.001,  output: 0.002 }
      - { model: glm-4.5,         input: 0.0005, output: 0.002 }
      - { model: moonshot-v1-8k,  input: 0.012,  output: 0.012 }
      - { model: gpt-4o-mini,     input: 0.0011, output: 0.0044 }
      - { model: default,         input: 0.002,  output: 0.006 }   # 未命中时的兜底单价

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: enterprise-ai-blueprint
    description: 企业级 AI 应用工程化参考实现 · Built with Spring AI

logging:
  level:
    org.springframework.ai: INFO
    io.github.mars.blueprint: DEBUG
