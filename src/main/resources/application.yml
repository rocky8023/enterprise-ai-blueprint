spring:
  application:
    name: enterprise-ai-blueprint

  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

  ai:
    openai:
      chat:
        api-key: ${BLUEPRINT_CHAT_API_KEY:}
        base-url: ${BLUEPRINT_CHAT_BASE_URL:https://api.minimaxi.com}
        options:
          model: ${BLUEPRINT_CHAT_MODEL:MiniMax-M2.7}
          temperature: 0.7
      embedding:
        api-key: ${BLUEPRINT_EMBEDDING_API_KEY:}
        base-url: ${BLUEPRINT_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
        options:
          model: ${BLUEPRINT_EMBEDDING_MODEL:text-embedding-v3}

blueprint:
  prompts:
    location: classpath:prompts/*.md
    active:
      rag.company-qa: v1
  rag:
    top-k: 4

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: enterprise-ai-blueprint
    description: 企业级 AI 应用工程化参考实现 · Built with Spring AI

logging:
  level:
    org.springframework.ai: INFO
    io.github.mars.blueprint: DEBUG
